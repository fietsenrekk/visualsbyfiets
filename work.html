<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Work — Visuals by Fiets | Edits, VFX & 3D Logo Animation</title>
  <meta name="description" content="The archive. Scroll or drag through the edits — click any piece to watch it full-screen with sound.">
  <link rel="icon" type="image/png" href="assets/img/logo-white.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Syncopate:wght@400;700&family=Red+Hat+Display:wght@700;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css?v=3">
  <link rel="stylesheet" href="css/risk-pages.css?v=3">
</head>
<body class="risk-page">
  <div class="noise"></div>

  <!-- loader -->
  <div class="r-load">
    <div class="r-load-local">
      <div>52&deg; 22&#x27; 12.000&quot; N</div>
      <div>4&deg; 53&#x27; 42.000&quot; E</div>
    </div>
    <div class="r-load-grad"></div>
    <div class="r-load-nbr">00</div>
  </div>

  <!-- nav -->
  <nav class="r-nav r-reveal">
    <a href="index.html">home</a>
    <a href="work.html" class="w--current">works</a>
    <a href="shop.html">shop</a>
    <a href="about.html">about</a>
    <a href="contact.html">contact</a>
  </nav>

  <!-- dot columns -->
  <div class="r-dots r-reveal"></div>

  <!-- fixed scene chrome -->
  <section class="r-section">
    <div class="r-container">
      <a href="index.html" class="r-logo-w r-reveal">
        <img src="assets/img/logo-white.png" alt="Visuals by Fiets" style="filter: sepia(0.35) saturate(0.6) brightness(0.98);">
        <div>vfx &amp; motion studio</div>
      </a>
      <div class="r-local r-reveal" style="margin:0;">
        <div>scroll &middot; drag &middot; click to watch</div>
      </div>
    </div>
  </section>

  <!-- infinite work carousel -->
  <div class="r-worklist-w">
    <div class="r-worklist"></div>
  </div>

  <!-- detail panel — same color panel -->
  <div class="r-detail" aria-hidden="true">
    <video class="r-detail-video" playsinline></video>
    <button class="r-close" aria-label="Close">close &times;</button>
    <div class="r-detail-ui">
      <div class="r-detail-titles">
        <h1></h1>
        <h2></h2>
      </div>
      <div class="r-player">
        <button class="r-player-btn" id="r-play">play</button>
        <div class="r-timeline">
          <div class="r-timeline-line"><div class="r-timeline-fill"></div></div>
        </div>
        <div class="r-timer">
          <div id="r-min">00</div><div>:</div><div id="r-sec">00</div><div>:</div><div id="r-mil">00</div>
        </div>
        <button class="r-player-btn" id="r-mute" style="text-align:right;">mute</button>
      </div>
    </div>
    <div class="r-credits">
      <div>edit / vfx / sound: visuals by fiets</div>
      <div>cut in premiere pro &middot; after effects</div>
      <div><a class="r-order-link" href="shop.html">order an edit like this &rarr;</a></div>
    </div>
    <button class="r-credit-btn">&copy; credits</button>
  </div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
  <script src="js/data.js?v=2"></script>
  <script src="js/risk-common.js?v=3"></script>
  <script src="js/risk-work.js?v=3"></script>
</body>
</html>
